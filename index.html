<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2a3238">
  <title>vCal</title>
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="main-content">
  <!-- Banner/Header -->
  <div class="banner" id="banner">
    <button id="top-back-btn" class="top-back-btn hidden" type="button" aria-label="Go back">Back</button>
    <h1 id="main-title"></h1>
    <p id="main-synopsis"></p>
    <div class="theme-switch" id="themeSwitch">
      <div class="switch-track">
        <label style="width:100%;height:100%;display:block;cursor:pointer;">
          <input type="checkbox" id="themeToggle" style="opacity:0;width:0;height:0;position:absolute;" />
          <div class="switch-bg">
            <span class="star star1"></span>
            <span class="star star2"></span>
            <span class="star star3"></span>
            <span class="star star4"></span>
            <span class="star star5"></span>
            <span class="star star6"></span>
            <span class="star star"></span>
            <span class="cloud"></span>
          </div>
          <div class="switch-knob">
            <div class="knob-img">
              <span class="crater crater1"></span>
              <span class="crater crater2"></span>
              <span class="crater crater3"></span>
            </div>
          </div>
        </label>
      </div>
    </div>
  </div>

  <!-- Department Grid -->
  <div class="card-grid" id="department-grid"></div>

  <!-- Modal for department preview -->
  <div class="card-modal" id="deptModal" style="display:none;">
    <div class="card-modal-content">
      <img id="modal-img" class="card-thumb" src="" alt="Department Preview" />
      <h2 id="modal-title"></h2>
      <p id="modal-brief"></p>
      <button class="button" id="modal-enter-btn"></button>
      <button class="button" id="modal-close-btn">Close</button>
    </div>
  </div>

  <!-- Calculator Selection Grid -->
  <div class="card-grid hidden" id="calculator-selection-grid"></div>
  
  <!-- Calculator Logic Container -->
  <div id="calculator-logic-container" class="liquid-glass hidden"></div>
</div>
  <!-- Fine Print -->
  <div class="fine-print" id="fine-print"></div>

  <div id="quick-calc-root">
    <button id="quick-calc-bubble" class="quick-calc-bubble" type="button" aria-label="Open quick calculator">Cal</button>

    <section id="quick-calc-panel" class="quick-calc-panel hidden" aria-label="Quick calculator">
      <div class="quick-calc-header">
        <h3 class="quick-calc-title">Quick Calculator</h3>
        <button id="quick-calc-close" class="quick-calc-close" type="button" aria-label="Close quick calculator">x</button>
      </div>

      <input id="quick-calc-display" class="quick-calc-display" type="text" value="0" readonly />

      <div class="quick-calc-grid">
        <button type="button" class="quick-calc-key" data-action="clear">C</button>
        <button type="button" class="quick-calc-key" data-action="backspace">DEL</button>
        <button type="button" class="quick-calc-key quick-calc-op" data-action="operator" data-value="/">÷</button>
        <button type="button" class="quick-calc-key quick-calc-op" data-action="operator" data-value="*">×</button>

        <button type="button" class="quick-calc-key" data-action="digit" data-value="7">7</button>
        <button type="button" class="quick-calc-key" data-action="digit" data-value="8">8</button>
        <button type="button" class="quick-calc-key" data-action="digit" data-value="9">9</button>
        <button type="button" class="quick-calc-key quick-calc-op" data-action="operator" data-value="-">-</button>

        <button type="button" class="quick-calc-key" data-action="digit" data-value="4">4</button>
        <button type="button" class="quick-calc-key" data-action="digit" data-value="5">5</button>
        <button type="button" class="quick-calc-key" data-action="digit" data-value="6">6</button>
        <button type="button" class="quick-calc-key quick-calc-op" data-action="operator" data-value="+">+</button>

        <button type="button" class="quick-calc-key" data-action="digit" data-value="1">1</button>
        <button type="button" class="quick-calc-key" data-action="digit" data-value="2">2</button>
        <button type="button" class="quick-calc-key" data-action="digit" data-value="3">3</button>
        <button type="button" class="quick-calc-key quick-calc-equals" data-action="equals">=</button>

        <button type="button" class="quick-calc-key quick-calc-zero" data-action="digit" data-value="0">0</button>
        <button type="button" class="quick-calc-key" data-action="decimal">.</button>
      </div>
    </section>
  </div>

  <!-- Scripts -->
  <script src="assets/js/textContent.js"></script>
  <script src="assets/js/calculators.js"></script>
  <script src="assets/js/themes.js"></script>
  <script src="assets/js/cardGrid.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('assets/js/service-worker.js');
  }
  </script>
</body>
</html>
